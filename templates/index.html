<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pothole Detection AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="background-animation"></div>
    
    <div class="glass-container">
        <h1>Pothole Detector</h1>
        <p>Upload an image to detect road damage.</p>
        
        <form method="POST" enctype="multipart/form-data" class="upload-form">
            <input type="file" name="file" accept="image/*" required class="file-input">
            <button type="submit" class="submit-btn">Analyze Image</button>
        </form>

        {% if result_image %}
        <div class="results-section">
            <h2>Detection Result</h2>
            <div class="pothole-count" style="margin-bottom: 20px; text-align: center;">
                <h3>Total Potholes Detected: <span style="color: #4CAF50;">{{ pothole_count }}</span></h3>
            </div>
            <div class="image-comparison">
                <div class="img-box">
                    <img src="{{ url_for('static', filename='uploads/' + result_image) }}" alt="Result Image">
                </div>
            </div>
        </div>
        {% endif %}
    </div>
</body>
</html>
